<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 회사 거래처 지도</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .info-box {
      padding: 12px;
      min-width: 240px;
      line-height: 1.6;
      font-size: 14px;
    }

    .info-box h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .info-box strong {
      display: inline-block;
      width: 70px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- 여기에 카카오 JavaScript 키를 넣습니다 -->
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=ca5353f84284c3cb5778577cb87e4f57&libraries=services"></script>

  <script>
    const stores = [
      {
        name: "스니커스(snickers)홍대",
        address: "서울시 마포구 와우산로17길 24, 1층(서교동)",
        phone: "010-6658-7712",
        manager: "최낙현",
        items: "팜프리츠 감자튀김",
        note: "주 3회 납품"
      },
      {
        name: "필앤필버거(PHIL&FILL BURGER)",
        address: "서울특별시 강남구 테헤란로 142 (역삼동) 지상1층",
        phone: "010-5493-0732",
        manager: "최낙현",
        items: "팜프리츠 감자튀김, 해시브라운",
        note: "주 3회 납품"
      }
      {
    name: "필앤필버거 김포점",
    address: "경기도 김포시 유현로 233",
    phone: "010-5493-0732",
    manager: "최낙",
    items: "팜프리츠 감자튀김",
    note: "주 2회 납품"
  }
];

    const mapContainer = document.getElementById("map");
    const mapOption = {
      center: new kakao.maps.LatLng(36.5, 127.8),
      level: 13
    };

    const map = new kakao.maps.Map(mapContainer, mapOption);
    let openedInfowindow = null;

    const geocoder = new kakao.maps.services.Geocoder();
    const bounds = new kakao.maps.LatLngBounds();

    const zoomControl = new kakao.maps.ZoomControl();
    map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

    stores.forEach((store) => {
      geocoder.addressSearch(store.address, function(result, status) {
        if (status === kakao.maps.services.Status.OK) {
          const coords = new kakao.maps.LatLng(result[0].y, result[0].x);

          const marker = new kakao.maps.Marker({
            map: map,
            position: coords
          });

          bounds.extend(coords);
          map.setBounds(bounds);

          const content = `
            <div class="info-box">
              <h3>${store.name}</h3>
              <div><strong>주소</strong> ${store.address}</div>
              <div><strong>전화</strong> ${store.phone}</div>
              <div><strong>담당자</strong> ${store.manager}</div>
              <div><strong>품목</strong> ${store.items}</div>
              <div><strong>비고</strong> ${store.note}</div>
            </div>
          `;

          const infowindow = new kakao.maps.InfoWindow({
  content: content,
  removable: true
});

kakao.maps.event.addListener(marker, "click", function() {
  if (openedInfowindow === infowindow) {
    infowindow.close();
    openedInfowindow = null;
    return;
  }

  if (openedInfowindow) {
    openedInfowindow.close();
  }

  infowindow.open(map, marker);
  openedInfowindow = infowindow;
});
        }
      });
    });
    kakao.maps.event.addListener(map, "click", function() {
  if (openedInfowindow) {
    openedInfowindow.close();
    openedInfowindow = null;
  }
});
    document.addEventListener("click", function() {
  if (openedInfowindow) {
    openedInfowindow.close();
    openedInfowindow = null;
  }
});
  </script>
</body>
</html>

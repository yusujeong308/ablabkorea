<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABLAB 매장 거래처 지도</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f9fb;
    }

    .layout {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    .sidebar {
      width: 380px;
      min-width: 380px;
      background: #ffffff;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
      background: #fff;
    }

    .sidebar-title {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 700;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .search-box input {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
    }

    .search-box button,
    .filter-actions button {
      padding: 10px 14px;
      font-size: 14px;
      border: none;
      background: #222;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .filter-box select {
      width: 100%;
      padding: 10px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }

    .filter-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .filter-actions button.secondary {
      background: #e9ecef;
      color: #222;
    }

    .selected-store {
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
      background: #fafafa;
    }

    .selected-store h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .selected-store .row {
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .selected-store .label {
      display: inline-block;
      width: 72px;
      font-weight: 700;
      color: #333;
    }

    .store-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .store-item {
      padding: 12px;
      border: 1px solid #ececec;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
      background: white;
    }

    .store-item:hover {
      background: #f7f7f7;
    }

    .store-item.active {
      border-color: #222;
      background: #f3f3f3;
    }

    .store-item-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .store-item-address {
      font-size: 13px;
      color: #555;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .store-item-meta {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .map-wrap {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .info-box {
      padding: 16px;
      width: 360px;
      line-height: 1.8;
      font-size: 14px;
      word-break: keep-all;
    }

    .info-box h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .info-box strong {
      display: inline-block;
      width: 70px;
      vertical-align: top;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title">거래처 매장 지도</h1>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="매장명 / 주소 / 품목 검색" />
          <button onclick="applyFilters()">검색</button>
        </div>

        <div class="filter-grid">
          <div class="filter-box">
            <select id="regionFilter" onchange="applyFilters()">
              <option value="">전체 지역</option>
            </select>
          </div>

          <div class="filter-box">
            <select id="managerFilter" onchange="applyFilters()">
              <option value="">전체 담당자</option>
            </select>
          </div>

          <div class="filter-box">
            <select id="itemFilter" onchange="applyFilters()">
              <option value="">전체 품목</option>
            </select>
          </div>
        </div>

        <div class="filter-actions">
          <button class="secondary" onclick="resetFilters()">필터 초기화</button>
        </div>
      </div>

      <div class="selected-store" id="selectedStore">
        <h2>매장을 선택하세요</h2>
        <div class="row">왼쪽 목록이나 지도 핀을 누르면 상세 정보가 표시됩니다.</div>
      </div>

      <div class="store-list" id="storeList"></div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>
    </div>
  </div>

  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=ca5353f84284c3cb5778577cb87e4f57&libraries=services"></script>

  <script>
    // 예시 데이터
    const stores = [
      {
        name: "스니커스(snickers)홍대",
        address: "서울시 마포구 와우산로17길 24, 1층(서교동)",
        phone: "010-6658-7712",
        manager: "최낙현",
        items: "팜프리츠 감자튀김",
        note: "주 3회 납품",
        region: "서울"
      },
      {
        name: "필앤필버거(PHIL&FILL BURGER)",
        address: "서울특별시 강남구 테헤란로 142 (역삼동) 지상1층",
        phone: "010-5493-0732",
        manager: "최낙현",
        items: "팜프리츠 감자튀김, 해시브라운",
        note: "주 3회 납품",
        region: "서울"
      },
      {
        name: "필앤필버거 김포점",
        address: "경기도 김포시 유현로 233, 1층 114호(풍무동, 풍무역파크트루엘)",
        phone: "010-5493-0732",
        manager: "최낙현",
        items: "팜프리츠 감자튀김",
        note: "주 2회 납품",
        region: "김포"
      }
    ];

    const mapContainer = document.getElementById("map");
    const mapOption = {
      center: new kakao.maps.LatLng(36.5, 127.8),
      level: 13
    };

    const map = new kakao.maps.Map(mapContainer, mapOption);
    const geocoder = new kakao.maps.services.Geocoder();
    const zoomControl = new kakao.maps.ZoomControl();

    map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

    const storeMarkers = [];
    let openedInfowindow = null;
    let selectedStoreName = null;

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/\s+/g, "")
        .trim();
    }

    function parseItems(itemsText) {
      return String(itemsText || "")
        .split(",")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function createUniqueOptions(arr) {
      return [...new Set(arr.filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
    }

    function renderFilterOptions() {
      const regionFilter = document.getElementById("regionFilter");
      const managerFilter = document.getElementById("managerFilter");
      const itemFilter = document.getElementById("itemFilter");

      const regions = createUniqueOptions(stores.map(store => store.region));
      const managers = createUniqueOptions(stores.map(store => store.manager));
      const items = createUniqueOptions(
        stores.flatMap(store => parseItems(store.items))
      );

      regionFilter.innerHTML = '<option value="">전체 지역</option>';
      managerFilter.innerHTML = '<option value="">전체 담당자</option>';
      itemFilter.innerHTML = '<option value="">전체 품목</option>';

      regions.forEach(region => {
        const option = document.createElement("option");
        option.value = region;
        option.textContent = region;
        regionFilter.appendChild(option);
      });

      managers.forEach(manager => {
        const option = document.createElement("option");
        option.value = manager;
        option.textContent = manager;
        managerFilter.appendChild(option);
      });

      items.forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        itemFilter.appendChild(option);
      });
    }

    function renderSelectedStore(store) {
      const box = document.getElementById("selectedStore");
      box.innerHTML = `
        <h2>${store.name}</h2>
        <div class="row"><span class="label">주소</span>${store.address}</div>
        <div class="row"><span class="label">전화</span>${store.phone}</div>
        <div class="row"><span class="label">담당자</span>${store.manager}</div>
        <div class="row"><span class="label">품목</span>${store.items}</div>
        <div class="row"><span class="label">비고</span>${store.note}</div>
        <div class="row"><span class="label">지역</span>${store.region}</div>
      `;
    }

    function renderDefaultMessage() {
      const selectedBox = document.getElementById("selectedStore");
      selectedBox.innerHTML = `
        <h2>매장을 선택하세요</h2>
        <div class="row">왼쪽 목록이나 지도 핀을 누르면 상세 정보가 표시됩니다.</div>
      `;
    }

    function renderResultMessage(results) {
      const selectedBox = document.getElementById("selectedStore");
      selectedBox.innerHTML = `
        <h2>검색 결과 ${results.length}개</h2>
        <div class="row">아래 목록이나 지도 핀에서 원하는 매장을 선택하세요.</div>
      `;
    }

    function renderNoResultMessage() {
      const selectedBox = document.getElementById("selectedStore");
      selectedBox.innerHTML = `
        <h2>검색 결과 없음</h2>
        <div class="row">조건에 맞는 매장이 없습니다.</div>
      `;
    }

    function renderStoreList(items) {
      const list = document.getElementById("storeList");
      list.innerHTML = "";

      items.forEach((store) => {
        const div = document.createElement("div");
        div.className = "store-item" + (selectedStoreName === store.name ? " active" : "");
        div.innerHTML = `
          <div class="store-item-title">${store.name}</div>
          <div class="store-item-address">${store.address}</div>
          <div class="store-item-meta">
            지역: ${store.region} / 담당자: ${store.manager}<br />
            품목: ${store.items}
          </div>
        `;

        div.addEventListener("click", function() {
          selectStore(store);
        });

        list.appendChild(div);
      });
    }

    function updateMarkers(results) {
      const bounds = new kakao.maps.LatLngBounds();

      storeMarkers.forEach(store => {
        const visible = results.includes(store);
        store.marker.setMap(visible ? map : null);

        if (visible) {
          bounds.extend(store.coords);
        }
      });

      if (results.length > 0) {
        map.setBounds(bounds);
      }
    }

    function closeOpenedInfowindow() {
      if (openedInfowindow) {
        openedInfowindow.close();
        openedInfowindow = null;
      }
    }

    function selectStore(store) {
      selectedStoreName = store.name;

      closeOpenedInfowindow();

      map.setCenter(store.coords);
      map.setLevel(3);

      store.infowindow.open(map, store.marker);
      openedInfowindow = store.infowindow;

      renderSelectedStore(store);

      const currentResults = getFilteredStores();
      renderStoreList(currentResults);
    }

    function getFilteredStores() {
      const keyword = normalizeText(document.getElementById("searchInput").value);
      const region = document.getElementById("regionFilter").value;
      const manager = document.getElementById("managerFilter").value;
      const item = document.getElementById("itemFilter").value;

      let results = [...storeMarkers];

      if (region) {
        results = results.filter(store => store.region === region);
      }

      if (manager) {
        results = results.filter(store => store.manager === manager);
      }

      if (item) {
        results = results.filter(store => parseItems(store.items).includes(item));
      }

      if (keyword) {
        results = results.filter(store => {
          const targetText = normalizeText(
            `${store.name} ${store.address} ${store.items} ${store.manager} ${store.region}`
          );
          return targetText.includes(keyword);
        });
      }

      return results;
    }

    function applyFilters() {
      if (storeMarkers.length === 0) {
        alert("매장 정보를 불러오는 중입니다. 잠시 후 다시 시도해 주세요.");
        return;
      }

      const keyword = normalizeText(document.getElementById("searchInput").value);
      const region = document.getElementById("regionFilter").value;
      const manager = document.getElementById("managerFilter").value;
      const item = document.getElementById("itemFilter").value;

      const results = getFilteredStores();

      closeOpenedInfowindow();

      if (!keyword && !region && !manager && !item) {
        selectedStoreName = null;
        updateMarkers(storeMarkers);
        renderStoreList(storeMarkers);
        renderDefaultMessage();
        return;
      }

      if (results.length === 0) {
        selectedStoreName = null;
        updateMarkers([]);
        document.getElementById("storeList").innerHTML = "";
        renderNoResultMessage();
        return;
      }

      if (selectedStoreName && !results.some(store => store.name === selectedStoreName)) {
        selectedStoreName = null;
      }

      updateMarkers(results);
      renderStoreList(results);
      renderResultMessage(results);
    }

    function resetFilters() {
      document.getElementById("searchInput").value = "";
      document.getElementById("regionFilter").value = "";
      document.getElementById("managerFilter").value = "";
      document.getElementById("itemFilter").value = "";

      selectedStoreName = null;
      closeOpenedInfowindow();
      updateMarkers(storeMarkers);
      renderStoreList(storeMarkers);
      renderDefaultMessage();
    }

    function initializeStores() {
      let loadedCount = 0;
      let successCount = 0;

      stores.forEach((store) => {
        geocoder.addressSearch(store.address, function(result, status) {
          loadedCount++;

          if (status === kakao.maps.services.Status.OK) {
            successCount++;

            const coords = new kakao.maps.LatLng(result[0].y, result[0].x);

            const marker = new kakao.maps.Marker({
              map: map,
              position: coords
            });

            const content = `
              <div class="info-box">
                <h3>${store.name}</h3>
                <div><strong>주소</strong> <span>${store.address}</span></div>
                <div><strong>전화</strong> <span>${store.phone}</span></div>
                <div><strong>담당자</strong> <span>${store.manager}</span></div>
                <div><strong>품목</strong> <span>${store.items}</span></div>
                <div><strong>비고</strong> <span>${store.note}</span></div>
                <div><strong>지역</strong> <span>${store.region}</span></div>
              </div>
            `;

            const infowindow = new kakao.maps.InfoWindow({
              content: content,
              removable: true
            });

            const storeData = {
              ...store,
              normalizedName: normalizeText(store.name),
              normalizedAddress: normalizeText(store.address),
              normalizedItems: normalizeText(store.items),
              normalizedManager: normalizeText(store.manager),
              normalizedRegion: normalizeText(store.region),
              marker,
              infowindow,
              coords
            };

            kakao.maps.event.addListener(marker, "click", function() {
              selectStore(storeData);
            });

            storeMarkers.push(storeData);
          } else {
            console.warn("주소 변환 실패:", store.name, store.address);
          }

          if (loadedCount === stores.length) {
            if (successCount > 0) {
              updateMarkers(storeMarkers);
              renderStoreList(storeMarkers);
            } else {
              alert("매장 좌표를 불러오지 못했습니다. 주소를 확인해 주세요.");
            }
          }
        });
      });
    }

    document.getElementById("searchInput").addEventListener("keyup", function(event) {
      if (event.key === "Enter") {
        applyFilters();
      }
    });

    renderFilterOptions();
    renderDefaultMessage();
    initializeStores();
  </script>
</body>
</html>

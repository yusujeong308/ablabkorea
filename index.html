<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABLAB 매장 거래처 지도</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .layout {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    .sidebar {
      width: 360px;
      min-width: 360px;
      background: #ffffff;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .sidebar-title {
      margin: 0 0 12px;
      font-size: 20px;
      font-weight: 700;
    }

    .search-box {
      display: flex;
      gap: 8px;
    }

    .search-box input {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
    }

    .search-box button {
      padding: 10px 14px;
      font-size: 14px;
      border: none;
      background: #222;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .selected-store {
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
      background: #fafafa;
    }

    .selected-store h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .selected-store .row {
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .selected-store .label {
      display: inline-block;
      width: 72px;
      font-weight: 700;
      color: #333;
    }

    .store-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .store-item {
      padding: 12px;
      border: 1px solid #ececec;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
      background: white;
    }

    .store-item:hover {
      background: #f7f7f7;
    }

    .store-item.active {
      border-color: #222;
      background: #f3f3f3;
    }

    .store-item-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .store-item-address {
      font-size: 13px;
      color: #555;
      line-height: 1.4;
    }

    .map-wrap {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

.info-box {
  padding: 16px;
  width: 360px;
  line-height: 1.8;
  font-size: 14px;
  word-break: keep-all;
}

.info-box h3 {
  margin: 0 0 10px;
  font-size: 18px;
}

.info-box strong {
  display: inline-block;
  width: 70px;
  vertical-align: top;
}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title">거래처 매장 지도</h1>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="매장명을 입력하세요" />
          <button onclick="searchStore()">검색</button>
        </div>
        
        <div style="margin-top: 10px;">
  <select id="regionFilter" onchange="applyFilters()" style="width: 100%; padding: 10px; border: 1px solid #d9d9d9; border-radius: 8px;">
    <option value="">전체 지역</option>
    <option value="서울">서울</option>
    <option value="경기">경기</option>
    <option value="인천">인천</option>
  </select>
</div>
      </div>

      <div class="selected-store" id="selectedStore">
        <h2>매장을 선택하세요</h2>
        <div class="row">왼쪽 목록이나 지도 핀을 누르면 상세 정보가 표시됩니다.</div>
      </div>

      <div class="store-list" id="storeList"></div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>
    </div>
  </div>

  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=ca5353f84284c3cb5778577cb87e4f57&libraries=services"></script>

  <script>
    const stores = [
      {
        name: "스니커스(snickers)홍대",
        address: "서울시 마포구 와우산로17길 24, 1층(서교동)",
        phone: "010-6658-7712",
        manager: "최낙현",
        items: "팜프리츠 감자튀김",
        note: "주 3회 납품"
          region: "서울"
      },
      {
        name: "필앤필버거(PHIL&FILL BURGER)",
        address: "서울특별시 강남구 테헤란로 142 (역삼동) 지상1층",
        phone: "010-5493-0732",
        manager: "최낙현",
        items: "팜프리츠 감자튀김, 해시브라운",
        note: "주 3회 납품"
          region: "서울"
      },
      {
        name: "필앤필버거 김포점",
        address: "경기도 김포시 유현로 233",
        phone: "010-5493-0732",
        manager: "최낙현",
        items: "팜프리츠 감자튀김",
        note: "주 2회 납품"
          region: "김포"
      }
    ];

    const mapContainer = document.getElementById("map");
    const mapOption = {
      center: new kakao.maps.LatLng(36.5, 127.8),
      level: 13
    };

    const map = new kakao.maps.Map(mapContainer, mapOption);
    const geocoder = new kakao.maps.services.Geocoder();
    const bounds = new kakao.maps.LatLngBounds();
    const storeMarkers = [];
    let openedInfowindow = null;
    let selectedStoreName = null;

    const zoomControl = new kakao.maps.ZoomControl();
    map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

    function normalizeText(text) {
      return String(text || "").toLowerCase().replace(/\s+/g, "");
    }

    function renderSelectedStore(store) {
      const box = document.getElementById("selectedStore");
      box.innerHTML = `
        <h2>${store.name}</h2>
        <div class="row"><span class="label">주소</span>${store.address}</div>
        <div class="row"><span class="label">전화</span>${store.phone}</div>
        <div class="row"><span class="label">담당자</span>${store.manager}</div>
        <div class="row"><span class="label">품목</span>${store.items}</div>
        <div class="row"><span class="label">비고</span>${store.note}</div>
      `;
    }
    function selectStore(store) {
  selectedStoreName = store.name;

  map.setCenter(store.coords);
  map.setLevel(3);

  if (openedInfowindow) {
    openedInfowindow.close();
  }

  store.infowindow.open(map, store.marker);
  openedInfowindow = store.infowindow;

  renderSelectedStore(store);
  renderStoreList(storeMarkers);
}

function renderStoreList(items) {
  const list = document.getElementById("storeList");
  list.innerHTML = "";

  items.forEach((store) => {
    const div = document.createElement("div");
    div.className = "store-item" + (selectedStoreName === store.name ? " active" : "");
    div.innerHTML = `
      <div class="store-item-title">${store.name}</div>
      <div class="store-item-address">${store.address}</div>
    `;
    div.addEventListener("click", function() {
      selectStore(store);
    });
    list.appendChild(div);
  });
}

function renderSearchResults(results) {
  const list = document.getElementById("storeList");
  list.innerHTML = "";

  const selectedBox = document.getElementById("selectedStore");
  selectedBox.innerHTML = `
    <h2>검색 결과 ${results.length}개</h2>
    <div class="row">아래 목록에서 원하는 매장을 선택하세요.</div>
  `;

  results.forEach((store) => {
    const div = document.createElement("div");
    div.className = "store-item";
    div.innerHTML = `
      <div class="store-item-title">${store.name}</div>
      <div class="store-item-address">${store.address}</div>
    `;
    div.addEventListener("click", function() {
      selectStore(store);
    });
    list.appendChild(div);
  });
}

window.searchStore = function() {
  const input = document.getElementById("searchInput");
  const keyword = normalizeText(input.value);

  if (!keyword) {
    renderStoreList(storeMarkers);
    const selectedBox = document.getElementById("selectedStore");
    selectedBox.innerHTML = `
      <h2>매장을 선택하세요</h2>
      <div class="row">왼쪽 목록이나 지도 핀을 누르면 상세 정보가 표시됩니다.</div>
    `;
    return;
  }

  if (storeMarkers.length === 0) {
    alert("매장 정보를 불러오는 중입니다. 잠시 후 다시 시도해 주세요.");
    return;
  }

  const results = storeMarkers.filter(function(store) {
    return store.normalizedName.includes(keyword);
  });

  if (results.length === 0) {
    const list = document.getElementById("storeList");
    list.innerHTML = "";
    const selectedBox = document.getElementById("selectedStore");
    selectedBox.innerHTML = `
      <h2>검색 결과 없음</h2>
      <div class="row">해당 매장을 찾을 수 없습니다.</div>
    `;
    return;
  }

  renderSearchResults(results);
};
stores.forEach((store) => {
  geocoder.addressSearch(store.address, function(result, status) {
    if (status === kakao.maps.services.Status.OK) {
      const coords = new kakao.maps.LatLng(result[0].y, result[0].x);

      const marker = new kakao.maps.Marker({
        map: map,
        position: coords
      });

      bounds.extend(coords);
      map.setBounds(bounds);

const content = `
  <div class="info-box">
    <h3>${store.name}</h3>
    <div><strong>주소</strong> <span>${store.address}</span></div>
    <div><strong>전화</strong> <span>${store.phone}</span></div>
    <div><strong>담당자</strong> <span>${store.manager}</span></div>
    <div><strong>품목</strong> <span>${store.items}</span></div>
    <div><strong>비고</strong> <span>${store.note}</span></div>
  </div>
`;

      const infowindow = new kakao.maps.InfoWindow({
        content: content,
        removable: true
      });

      const storeData = {
        ...store,
        normalizedName: normalizeText(store.name),
        marker: marker,
        infowindow: infowindow,
        coords: coords
      };

      kakao.maps.event.addListener(marker, "click", function() {
        selectStore(storeData);
      });

      storeMarkers.push(storeData);
      renderStoreList(storeMarkers);
    }
  });
});
document.getElementById("searchInput").addEventListener("keyup", function(event) {
  if (event.key === "Enter") {
    searchStore();
    if (keyword) {
    results = results.filter(function(store) {
      return store.normalizedName.includes(keyword);
    });
  }

  if (results.length === 0) {
    const list = document.getElementById("storeList");
    list.innerHTML = "";
    const selectedBox = document.getElementById("selectedStore");
    selectedBox.innerHTML = `
      <h2>검색 결과 없음</h2>
      <div class="row">조건에 맞는 매장이 없습니다.</div>
    `;
    return;
  }

  renderSearchResults(results);
  }
});
  </script>
</body>
</html>
